<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bibelvers-Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;min-height:100vh;background:radial-gradient(ellipse at 0% 0%,#3b0764 0%,transparent 45%),radial-gradient(ellipse at 100% 0%,#1e1b4b 0%,transparent 45%),radial-gradient(ellipse at 50% 60%,#0f172a 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,#1a0533 0%,transparent 50%),radial-gradient(ellipse at 20% 100%,#0c1445 0%,transparent 50%),linear-gradient(160deg,#0d0618 0%,#0f0c29 50%,#0a0a1a 100%);position:relative;overflow-x:hidden;}
.orb1{position:fixed;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.22) 0%,transparent 70%);top:-80px;left:-80px;pointer-events:none;z-index:0;}
.orb2{position:fixed;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.18) 0%,transparent 70%);top:40px;right:-60px;pointer-events:none;z-index:0;}
.orb3{position:fixed;width:400px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.12) 0%,transparent 70%);bottom:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 22% 35%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 38% 8%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 55% 25%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 72% 15%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 88% 40%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 15% 65%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 78%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 78% 70%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 92% 85%,rgba(255,255,255,.5) 0%,transparent 100%);}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:2rem 1.25rem 3rem;}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(196,181,253,.15);border-top-color:rgba(167,139,250,.7);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:rgba(196,181,253,.4);}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(134,239,172,.6);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);border-radius:20px;padding:3px 9px;margin-bottom:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#86efac;display:inline-block;}
.logo-wrap{text-align:center;padding:1.5rem 0 2rem;}
.halo{width:76px;height:76px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,rgba(168,85,247,.4),rgba(99,102,241,.4));border:1.5px solid rgba(196,181,253,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(139,92,246,.4),0 0 80px rgba(139,92,246,.15),inset 0 0 20px rgba(139,92,246,.15);}
.app-title{font-family:'Lora',serif;font-size:26px;font-weight:600;color:#ede9fe;letter-spacing:.3px;}
.app-sub{font-size:13px;color:rgba(196,181,253,.45);margin-top:5px;}
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
.user-card{padding:18px 12px;border-radius:18px;cursor:pointer;text-align:center;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(139,92,246,.07));border:1px solid rgba(196,181,253,.15);transition:transform .18s,box-shadow .18s;}
.user-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(139,92,246,.25);}
.user-avatar{width:54px;height:54px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid rgba(255,255,255,.15);}
.user-name{font-size:14px;font-weight:500;color:rgba(237,233,254,.9);}
.user-count{font-size:11px;color:rgba(196,181,253,.38);margin-top:3px;}
.add-user-btn{width:100%;padding:13px;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(139,92,246,.05));border:1px dashed rgba(196,181,253,.25);color:rgba(196,181,253,.5);font-size:14px;transition:all .18s;}
.add-user-btn:hover{border-color:rgba(196,181,253,.45);color:rgba(196,181,253,.8);}
.modal-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);}
.modal{width:100%;max-width:340px;margin:0 1rem;padding:24px;border-radius:22px;background:linear-gradient(145deg,rgba(30,20,60,.97),rgba(15,12,41,.97));border:1px solid rgba(196,181,253,.2);box-shadow:0 24px 64px rgba(0,0,0,.6);}
.modal-title{font-family:'Lora',serif;font-size:20px;color:#ede9fe;margin-bottom:4px;}
.modal-sub{font-size:13px;color:rgba(196,181,253,.45);margin-bottom:20px;}
.m-label{font-size:11px;color:rgba(196,181,253,.5);font-weight:500;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.m-input{width:100%;padding:9px 13px;border-radius:11px;outline:none;margin-bottom:12px;background:rgba(255,255,255,.07);border:1px solid rgba(196,181,253,.18);color:rgba(237,233,254,.9);font-size:14px;font-family:'Inter',sans-serif;}
.m-input::placeholder{color:rgba(196,181,253,.25);}
.m-input:focus{border-color:rgba(167,139,250,.55);background:rgba(139,92,246,.1);}
.m-input.err{border-color:rgba(252,165,165,.5);}
.err-msg{font-size:12px;color:#fca5a5;margin:-8px 0 10px;display:block;}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.emoji-opt{width:34px;height:34px;border-radius:9px;border:1px solid rgba(196,181,253,.15);background:rgba(255,255,255,.05);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emoji-opt.sel{border-color:rgba(167,139,250,.6);background:rgba(139,92,246,.2);}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,box-shadow .15s;}
.color-opt.sel{transform:scale(1.25);box-shadow:0 0 0 2px rgba(255,255,255,.4);}
.modal-btns{display:flex;gap:8px;}
.m-ghost{flex:1;padding:10px;border-radius:11px;background:rgba(255,255,255,.06);border:1px solid rgba(196,181,253,.15);color:rgba(196,181,253,.6);font-size:13px;font-weight:500;cursor:pointer;}
.m-prim{flex:2;padding:10px;border-radius:11px;border:none;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:white;font-size:13px;font-weight:500;cursor:pointer;}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.back-btn{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(99,102,241,.1));border:1px solid rgba(196,181,253,.2);color:rgba(221,214,254,.8);cursor:pointer;font-size:18px;padding:6px 12px;border-radius:10px;}
.page-title{font-size:16px;font-weight:500;color:rgba(237,233,254,.9);}
.menu-btn{width:100%;padding:16px 18px;border:none;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:10px;border-radius:18px;text-align:left;transition:transform .18s,box-shadow .18s;}
.menu-btn:hover{transform:translateY(-2px);}
.menu-edit{background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(139,92,246,.08));border:1px solid rgba(196,181,253,.18);}
.menu-flash{background:linear-gradient(135deg,#7c3aed,#4f46e5 50%,#6d28d9);border:1px solid rgba(196,181,253,.3);box-shadow:0 8px 32px rgba(99,102,241,.4);}
.menu-luecke{background:linear-gradient(135deg,#0f766e,#0d9488 50%,#0f766e);border:1px solid rgba(20,184,166,.3);box-shadow:0 8px 32px rgba(13,148,136,.3);}
.menu-order{background:linear-gradient(135deg,#92400e,#b45309 50%,#92400e);border:1px solid rgba(180,83,9,.4);box-shadow:0 8px 32px rgba(146,64,14,.3);}
.menu-profile{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(99,102,241,.07));border:1px solid rgba(196,181,253,.14);}
.menu-btn.disabled{opacity:.38;cursor:not-allowed;}
.mc-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:rgba(255,255,255,.15);}
.mc-title{font-weight:500;font-size:15px;color:rgba(237,233,254,.95);margin-bottom:2px;}
.mc-sub{font-size:12px;color:rgba(255,255,255,.55);}
.stats{display:flex;gap:8px;margin-top:1rem;}
.stat{flex:1;padding:12px 8px;border-radius:14px;text-align:center;background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(139,92,246,.06));border:1px solid rgba(196,181,253,.12);}
.stat-n{font-size:22px;font-weight:500;color:#c4b5fd;font-family:'Lora',serif;}
.stat-l{font-size:11px;color:rgba(196,181,253,.38);margin-top:2px;}
.form-panel{padding:16px;margin-bottom:14px;border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(139,92,246,.07));border:1px solid rgba(196,181,253,.15);}
.f-label{font-size:11px;color:rgba(196,181,253,.5);font-weight:500;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.f-input{width:100%;padding:9px 13px;border-radius:11px;outline:none;background:#1e1a3e;border:1px solid rgba(196,181,253,.25);color:#ede9fe;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:10px;}
.f-input::placeholder{color:rgba(196,181,253,.35);}
.f-input:focus{border-color:rgba(167,139,250,.7);background:#241f4a;}
.f-input option{background:#1e1a3e;color:#ede9fe;}
.f-textarea{min-height:80px;resize:vertical;line-height:1.5;}
.save-btn{width:100%;padding:11px;border:none;border-radius:11px;background:linear-gradient(135deg,#8b5cf6,#6366f1 50%,#7c3aed);color:white;font-weight:500;font-size:14px;cursor:pointer;transition:opacity .15s;}
.save-btn:hover{opacity:.88;}
.save-btn:disabled{opacity:.4;cursor:default;}
.cancel-lnk{background:none;border:none;color:rgba(196,181,253,.35);font-size:12px;cursor:pointer;width:100%;margin-top:6px;padding:4px;}
.vlist{display:flex;flex-direction:column;gap:8px;}
.vitem{padding:12px 14px;border-radius:14px;display:flex;gap:10px;align-items:flex-start;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(139,92,246,.05));border:1px solid rgba(196,181,253,.1);}
.v-stelle{font-weight:500;font-size:13px;color:#c4b5fd;margin-bottom:3px;}
.v-text{font-size:13px;color:rgba(196,181,253,.5);line-height:1.5;}
.v-meta{font-size:11px;color:rgba(196,181,253,.28);margin-top:5px;display:flex;gap:8px;align-items:center;}
.dots{display:flex;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;}
.ibtn{padding:6px 9px;border-radius:8px;border:none;cursor:pointer;font-size:13px;}
.ibtn-e{background:rgba(139,92,246,.15);color:#c4b5fd;}
.ibtn-d{background:rgba(239,68,68,.1);color:#f87171;}
.ibtn-dc{background:rgba(239,68,68,.6);color:white;font-size:12px;}
.empty{text-align:center;padding:2rem;color:rgba(196,181,253,.3);font-size:14px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#818cf8,#6d28d9);border-radius:2px;transition:width .4s ease;}
.prog-lbl{font-size:12px;color:rgba(196,181,253,.4);white-space:nowrap;}
.card-area{height:260px;perspective:1200px;margin-bottom:14px;cursor:pointer;user-select:none;}
.flip-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);position:relative;}
.flip-inner.flipped{transform:rotateY(180deg);}
.f-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden;}
.f-front{background:linear-gradient(145deg,#4c1d95,#3730a3 40%,#1e1b4b 80%,#1a0533);border:1px solid rgba(196,181,253,.3);box-shadow:0 16px 48px rgba(79,70,229,.45),inset 0 1px 0 rgba(255,255,255,.12);}
.f-back{background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(139,92,246,.08) 50%,rgba(255,255,255,.05));border:1px solid rgba(196,181,253,.2);transform:rotateY(180deg);}
.card-eyebrow,.back-eyebrow{font-size:10px;letter-spacing:2px;font-weight:500;color:rgba(196,181,253,.45);text-transform:uppercase;margin-bottom:14px;z-index:1;}
.card-stelle{font-family:'Lora',serif;font-size:28px;font-weight:600;color:#ede9fe;line-height:1.3;margin-bottom:20px;z-index:1;}
.tap-hint{font-size:12px;color:rgba(196,181,253,.35);z-index:1;}
.back-verse{font-family:'Lora',serif;font-size:16px;line-height:1.8;color:rgba(237,233,254,.88);font-style:italic;z-index:1;}
.ans-row{display:flex;gap:10px;margin-bottom:10px;}
.ans-btn{flex:1;padding:14px;border-radius:15px;font-weight:500;font-size:15px;cursor:pointer;transition:transform .15s;font-family:'Inter',sans-serif;}
.ans-btn:hover{transform:translateY(-2px);}
.ans-no{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(185,28,28,.1));border:1px solid rgba(252,165,165,.25);color:#fca5a5;}
.ans-yes{background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(21,128,61,.1));border:1px solid rgba(134,239,172,.25);color:#86efac;}
.done-top{text-align:center;padding:1rem 0 1.25rem;}
.done-emoji{font-size:54px;display:block;margin-bottom:10px;}
.done-title{font-family:'Lora',serif;font-size:24px;font-weight:600;color:#ede9fe;margin-bottom:4px;}
.done-sub{font-size:14px;color:rgba(196,181,253,.45);}
.rdots{display:flex;gap:5px;justify-content:center;margin:14px 0;flex-wrap:wrap;}
.rdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}
.rdot-ok{background:rgba(34,197,94,.13);color:#86efac;border:1px solid rgba(34,197,94,.28);}
.rdot-no{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.22);}
.rlist{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ritem{padding:10px 13px;border-radius:12px;display:flex;gap:10px;align-items:center;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(139,92,246,.05));border:1px solid rgba(196,181,253,.1);}
.ri-marker{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ri-stelle{font-weight:500;font-size:13px;color:#c4b5fd;margin-bottom:2px;}
.ri-text{font-size:12px;color:rgba(196,181,253,.42);line-height:1.4;}
.btn-row{display:flex;gap:8px;}
.ghost-btn{flex:1;padding:12px;border-radius:13px;cursor:pointer;font-size:14px;font-weight:500;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(139,92,246,.06));border:1px solid rgba(196,181,253,.15);color:rgba(196,181,253,.65);}
.prim-btn{flex:2;padding:12px;border-radius:13px;border:none;cursor:pointer;font-size:14px;font-weight:500;background:linear-gradient(135deg,#8b5cf6,#6366f1 50%,#7c3aed);color:white;box-shadow:0 6px 24px rgba(99,102,241,.4);transition:opacity .15s;}
.prim-btn:hover{opacity:.88;}
.profile-hero{text-align:center;padding:1rem 0 1.5rem;}
.profile-big-avatar{width:84px;height:84px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:38px;border:2.5px solid rgba(255,255,255,.2);}
.profile-name{font-family:'Lora',serif;font-size:22px;font-weight:600;color:#ede9fe;}
.profile-meta{font-size:12px;color:rgba(196,181,253,.4);margin-top:3px;}
.section-label{font-size:11px;color:rgba(196,181,253,.4);font-weight:500;letter-spacing:.8px;text-transform:uppercase;margin:0 0 8px 2px;}
.profile-section{margin-bottom:18px;}
.success-msg{font-size:12px;color:#86efac;margin-top:6px;display:block;}
.danger-zone{margin-top:8px;padding:14px;border-radius:16px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);}
.danger-title{font-size:13px;font-weight:500;color:#fca5a5;margin-bottom:6px;}
.danger-sub{font-size:12px;color:rgba(252,165,165,.5);margin-bottom:10px;line-height:1.5;}
.danger-btn{padding:9px 16px;border-radius:10px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#fca5a5;font-size:13px;font-weight:500;cursor:pointer;}
.danger-btn-confirm{background:rgba(239,68,68,.6);color:white;border-color:transparent;}
.invisible{visibility:hidden;}
.menu-stats{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(99,102,241,.1));border:1px solid rgba(196,181,253,.2);}
.stats-bar-wrap{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;margin-bottom:10px;}
.stats-bar{display:flex;gap:3px;height:100%;}
.stats-legend{display:flex;flex-direction:column;gap:5px;margin-bottom:1.25rem;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(196,181,253,.6);}
.legend-item b{color:rgba(237,233,254,.9);}
.stat-verse-row{padding:10px 14px;border-radius:13px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(139,92,246,.05));border:1px solid rgba(196,181,253,.08);margin-bottom:7px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;}
.gap-wrong{font-family:'Lora',serif;font-size:16px;color:#fca5a5;border-bottom:2px solid rgba(252,165,165,.5);padding:0 4px;margin:0 2px;}
.luecke-card{padding:1.25rem;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(15,118,110,.1));border:1px solid rgba(20,184,166,.2);margin-bottom:1rem;font-family:'Lora',serif;font-size:17px;line-height:2.4;color:rgba(237,233,254,.9);}
.stelle-label{font-size:11px;letter-spacing:2px;color:rgba(20,184,166,.6);text-transform:uppercase;font-weight:500;margin-bottom:12px;display:block;font-family:'Inter',sans-serif;}
.gap-input{font-family:'Lora',serif;font-size:16px;border:none;border-bottom:2px solid rgba(20,184,166,.6);background:transparent;color:#5eead4;outline:none;text-align:center;padding:2px 4px;margin:0 2px;transition:border-color .2s;}
.gap-input:focus{border-bottom-color:#2dd4bf;}
.gap-input.correct{border-bottom-color:#86efac;color:#86efac;}
.gap-input.wrong{border-bottom-color:#fca5a5;color:#fca5a5;}
.gap-revealed{font-family:'Lora',serif;font-size:16px;color:#86efac;border-bottom:2px solid rgba(134,239,172,.5);padding:0 4px;margin:0 2px;}
.check-btn{width:100%;padding:13px;border:none;border-radius:13px;background:linear-gradient(135deg,#0f766e,#0d9488);color:white;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;}
.next-btn{width:100%;padding:13px;border:none;border-radius:13px;background:linear-gradient(135deg,#8b5cf6,#6366f1 50%,#7c3aed);color:white;font-size:15px;font-weight:500;cursor:pointer;}
.order-hint{font-size:13px;color:rgba(196,181,253,.45);text-align:center;margin-bottom:12px;}
.chunk-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.chunk{padding:13px 16px;border-radius:13px;font-family:'Lora',serif;font-size:15px;color:rgba(237,233,254,.9);cursor:pointer;border:1px solid rgba(196,181,253,.2);background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(146,64,14,.12));display:flex;align-items:center;gap:10px;transition:all .18s;user-select:none;}

// ── Constants ────────────────────────────────────────────────────
const PALETTE=["#8b5cf6","#6366f1","#ec4899","#f97316","#14b8a6","#10b981","#3b82f6","#f59e0b"];

// ── Hashing ──────────────────────────────────────────────────────
async function hashPw(pw){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── Spaced repetition ────────────────────────────────────────────
function getWeight(v){
  const d=(Date.now()-v.added)/86400000;
  const nb=d<2?4:d<7?2:1;
  const eb=Math.max(0,(v.attempts-v.score*2))*2;
  const mp=v.score>4?Math.pow(0.5,v.score-4):1;
  return Math.max(0.1,(nb+eb+1)*mp);
}
function pickTen(verses){
  if(!verses.length) return [];
  const w=verses.map(getWeight),tot=w.reduce((a,b)=>a+b,0);
  const chosen=[],used=new Set(),cnt=Math.min(10,verses.length);
  let t=0;
  while(chosen.length<cnt&&t<500){t++;let r=Math.random()*tot;for(let i=0;i<verses.length;i++){r-=w[i];if(r<=0&&!used.has(i)){used.add(i);chosen.push({...verses[i]});break;}}}
  return chosen.sort(()=>Math.random()-.5);
}

// ── Lückentext ───────────────────────────────────────────────────
function gapCount(score){return score<=1?1:score<=3?2:3;}
function buildLuecken(verse){
  const words=verse.text.split(" ");
  const n=gapCount(verse.score||0);
  const idx=new Set();
  while(idx.size<Math.min(n,words.length)) idx.add(Math.floor(Math.random()*words.length));
  return words.map((w,i)=>({word:w,isGap:idx.has(i),input:"",state:"idle"}));
}

// ── Reihenfolge ──────────────────────────────────────────────────
function buildChunks(verse){
  const words=verse.text.trim().split(/\s+/);
  const sz=words.length<=6?2:words.length<=12?3:4;
  const orig=[];
  for(let i=0;i<words.length;i+=sz) orig.push(words.slice(i,i+sz).join(" "));
  const cur=[...orig];
  for(let i=cur.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cur[i],cur[j]]=[cur[j],cur[i]];}
  if(cur.every((c,i)=>c===orig[i])&&orig.length>1)[cur[0],cur[1]]=[cur[1],cur[0]];
  return{orig,cur,sel:null};
}

// ── DOM helpers ──────────────────────────────────────────────────
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="cls") e.className=v;
    else if(k.startsWith("on")&&typeof v==="function") e[k]=v;
    else if(v!=null) e.setAttribute(k,v);
  }
  for(const c of ch.flat()) if(c!=null) e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  return e;
}
const div=(cls,...ch)=>el("div",{cls},...ch);
const btn=(cls,txt,onclick)=>el("button",{cls,onclick,type:"button"},txt);
const p=(cls,txt)=>el("p",{cls},txt);

}

const KAPITEL=[50,40,27,36,34,24,21,4,31,24,22,25,29,36,10,13,10,42,150,31,12,8,66,52,5,48,12,14,3,9,1,4,7,3,3,3,2,14,4,28,16,24,21,28,16,16,13,6,6,4,4,5,3,6,4,3,1,13,5,5,3,5,1,1,1,22];

// Englische Buchnamen für die API (getbible.net verwendet KJV-Namen)
const BUECHER_API=[
  "Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth",
  "1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles",
  "Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon",
  "Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos",
  "Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi",

  "Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John",
  "3 John","Jude","Revelation"
];

async function loadVerse(transl, bookIdx, chapter, verse) {
  try {
    const book=encodeURIComponent(BUECHER_API[bookIdx]);
    const url=`https://query.getbible.net/v2/${transl}/${book} ${chapter}:${verse}`;
    const r=await fetch(url);
    const d=await r.json();
    // Antwort: { "schlachter_43_3": { verses: [{text, verse, ...}], ... } }
    const key=Object.keys(d)[0];
    if(!key) return null;
    const verses=d[key].verses;
    if(!verses||!verses.length) return null;
    return verses[0].text.trim();
  } catch(e) { console.error("API",e); return null; }
}

  if(!S.verses.length) list.appendChild(div("empty","Noch keine Verse – füge deinen ersten hinzu!"));

// ── Flashcard ────────────────────────────────────────────────────
function renderFlash(){
  const card=S.session[S.idx];
  if(!card) return renderDone();
  const inner=div("flip-inner"+(S.flipped?" flipped":""),
    div("f-face f-front",span("card-eyebrow","Bibelstelle"),p("card-stelle",card.stelle),span("tap-hint","👆 Antippen zum Aufdecken")),
    div("f-face f-back",span("back-eyebrow",card.stelle),p("back-verse",`„${card.text}"`))
  );
  const area=div("card-area",inner);
  area.onclick=()=>{if(!S.flipped)set({flipped:true});};
  const ans=div("ans-row",
    btn("ans-btn ans-no","✗ Nicht gewusst",async()=>{
      const upd=S.verses.map(v=>v.id===card.id?{...v,score:Math.max(0,v.score-1),attempts:v.attempts+1}:v);
      await saveVerses(upd);
      const res=[...S.results,{...card,correct:false}];
      if(S.idx+1>=S.session.length) set({results:res,view:"done"});
      else set({results:res,idx:S.idx+1,flipped:false});
    }),
    btn("ans-btn ans-yes","✓ Gewusst",async()=>{
      const upd=S.verses.map(v=>v.id===card.id?{...v,score:v.score+1,attempts:v.attempts+1}:v);
      await saveVerses(upd);
      const res=[...S.results,{...card,correct:true}];
      if(S.idx+1>=S.session.length) set({results:res,view:"done"});
      else set({results:res,idx:S.idx+1,flipped:false});
    })
  );
  if(!S.flipped) ans.classList.add("invisible");
  return el("div",{},progRow(S.idx,S.session.length,()=>set({view:"menu"})),area,ans);
}

// ── Stats ────────────────────────────────────────────────────────
function getPercent(v){if(!v.attempts)return null;return Math.round(Math.min(1,v.score/v.attempts)*100);}
function renderStats(){
  const hdr=div("page-header",btn("back-btn","←",()=>set({view:"menu"})),el("h2",{cls:"page-title"},"Meine Statistik"));
  const groups=[{label:"Noch zu üben",color:"#fca5a5",min:0,max:59},{label:"Auf gutem Weg",color:"#fcd34d",min:60,max:89},{label:"Kann ich auswendig",color:"#86efac",min:90,max:100}];
  const untrained=S.verses.filter(v=>!v.attempts);
  const trained=S.verses.filter(v=>v.attempts>0);
  const wrap=el("div",{},hdr);
  wrap.appendChild(el("p",{style:"font-size:12px;color:rgba(196,181,253,.35);margin-bottom:1rem;text-align:center;font-style:italic"},"Basiert ausschliesslich auf Karteikarten-Ergebnissen"));
  if(!S.verses.length){wrap.appendChild(div("empty","Noch keine Verse vorhanden."));return wrap;}
  const sumBar=div("stats-bar");
  groups.forEach(g=>{
    const count=trained.filter(v=>{const pct=getPercent(v);return pct!==null&&pct>=g.min&&pct<=g.max;}).length;
    sumBar.appendChild(el("div",{style:`flex:${count||0};min-width:${count>0?8:0}px;background:${g.color};border-radius:4px;height:100%;`}));
  });
  wrap.appendChild(div("stats-bar-wrap",sumBar));
  const legend=div("stats-legend");
  groups.forEach(g=>{
    const count=trained.filter(v=>{const pct=getPercent(v);return pct!==null&&pct>=g.min&&pct<=g.max;}).length;
    legend.appendChild(div("legend-item",el("div",{style:`width:10px;height:10px;border-radius:50%;background:${g.color};flex-shrink:0`}),span("",`${g.label}: `),el("b",{},String(count))));
  });
  if(untrained.length) legend.appendChild(div("legend-item",el("div",{style:"width:10px;height:10px;border-radius:50%;background:rgba(196,181,253,.3);flex-shrink:0"}),span("",`Noch nicht geübt: `),el("b",{},String(untrained.length))));
  wrap.appendChild(legend);
  groups.forEach(g=>{
    const gV=trained.filter(v=>{const pct=getPercent(v);return pct!==null&&pct>=g.min&&pct<=g.max;});
    if(!gV.length)return;
    wrap.appendChild(el("h3",{style:`font-size:12px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:${g.color};margin:1.25rem 0 8px 2px;font-family:'Inter',sans-serif`},g.label));
    gV.sort((a,b)=>getPercent(a)-getPercent(b)).forEach(v=>{
      const pct=getPercent(v);
      const row=div("stat-verse-row",
        el("div",{style:"flex:1;min-width:0"},p("v-stelle",v.stelle),p("v-text",v.text.length>60?v.text.slice(0,60)+"…":v.text)),
        el("div",{style:"flex-shrink:0;text-align:right"},el("div",{style:`font-size:15px;font-weight:500;color:${g.color};font-family:'Lora',serif`},`${pct}%`),el("div",{style:"font-size:11px;color:rgba(196,181,253,.35);margin-top:2px"},`${v.attempts} Versuche`))
      );
      const bw=el("div",{style:"width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden"});
      bw.appendChild(el("div",{style:`width:${pct}%;height:100%;background:${g.color};border-radius:2px;`}));
      row.appendChild(bw);wrap.appendChild(row);
    });
  });
  if(untrained.length){
    wrap.appendChild(el("h3",{style:"font-size:12px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:rgba(196,181,253,.35);margin:1.25rem 0 8px 2px;font-family:'Inter',sans-serif"},"Noch nicht geübt"));
    untrained.forEach(v=>wrap.appendChild(div("stat-verse-row",el("div",{style:"flex:1;min-width:0"},p("v-stelle",v.stelle),p("v-text",v.text.length>60?v.text.slice(0,60)+"…":v.text)),el("div",{style:"flex-shrink:0;text-align:right"},el("div",{style:"font-size:13px;color:rgba(196,181,253,.3)"},"–")))));
  }
  return wrap;
}

// ── Lückentext ───────────────────────────────────────────────────
function renderLuecke(){
  const card=S.session[S.idx];
  if(!card||!S.luecken) return div("");
  const card2=div("luecke-card",span("stelle-label",card.stelle));
  S.luecken.forEach((tok,i)=>{
    if(!tok.isGap){card2.appendChild(document.createTextNode((i>0?" ":"")+tok.word));return;}
    if(i>0) card2.appendChild(document.createTextNode(" "));
    if(tok.state==="correct"){card2.appendChild(span("gap-revealed",tok.word));return;}
    if(tok.state==="wrong"){card2.appendChild(span("gap-wrong",tok.word));return;}
    const inp=el("input",{cls:"gap-input",type:"text",placeholder:"…",style:`width:${Math.max(60,tok.word.length*13)}px`});
    inp.value=tok.input;inp.oninput=e=>{S.luecken[i].input=e.target.value;};
    inp.onkeydown=e=>{if(e.key==="Enter")checkLuecken();};
    card2.appendChild(inp);
  });
  const allDone=S.luecken.filter(t=>t.isGap).every(t=>t.state==="correct"||t.state==="wrong");
  const checkB=btn("check-btn","Überprüfen ✓",checkLuecken);
  const nextB=btn("next-btn",S.idx+1>=S.session.length?"Auswertung →":"Nächster Vers →",async()=>{
    const allOk=S.luecken.filter(t=>t.isGap).every(t=>t.state==="correct");
    const upd=S.verses.map(v=>v.id===card.id?{...v,score:allOk?v.score+1:Math.max(0,v.score-1),attempts:v.attempts+1}:v);
    await saveVerses(upd);
    const res=[...S.results,{...card,correct:allOk}];
    if(S.idx+1>=S.session.length) set({results:res,view:"done"});
    else set({results:res,idx:S.idx+1,luecken:buildLuecken(S.session[S.idx+1])});
  });
  return el("div",{},progRow(S.idx,S.session.length,()=>set({view:"menu"})),card2,allDone?nextB:checkB);
}
function checkLuecken(){
  const clean=s=>s.trim().toLowerCase().replace(/[.,;:!?„"»«""]/g,"");
  S.luecken.forEach(tok=>{if(!tok.isGap||tok.state==="correct"||tok.state==="wrong")return;tok.state=clean(tok.input)===clean(tok.word)?"correct":"wrong";});
  set({luecken:[...S.luecken]});
}

// ── Reihenfolge ──────────────────────────────────────────────────
function renderOrder(){
  const card=S.session[S.idx];
  if(!card||!S.order) return div("");
  const{orig,cur,sel}=S.order;
  const allOk=cur.every((c,i)=>c===orig[i]);
  const list=div("chunk-list",...cur.map((chunk,i)=>{
    const isSel=sel===i;
    const c=div("chunk"+(allOk?" correct-pos":isSel?" selected":""),span("chunk-num",String(i+1)),span("",chunk));
    if(!allOk) c.onclick=()=>{
      if(sel===null||sel===undefined){set({order:{...S.order,sel:i}});}
      else if(sel===i){set({order:{...S.order,sel:null}});}
      else{const nc=[...cur];[nc[sel],nc[i]]=[nc[i],nc[sel]];set({order:{orig,cur:nc,sel:null}});}
    };
    return c;
  }));
  let bottom;
  if(allOk){
    const nextB=btn("next-btn",S.idx+1>=S.session.length?"Fertig →":"Nächster Vers →",()=>{
      const res=[...S.results,{...card,correct:true}];
      if(S.idx+1>=S.session.length) set({results:res,view:"menu"});
      else set({results:res,idx:S.idx+1,order:buildChunks(S.session[S.idx+1])});
    });
    nextB.style.width="100%";
    bottom=el("div",{},p("order-success","✓ Perfekt! Richtige Reihenfolge!"),nextB);
  } else bottom=p("","");
  return el("div",{},progRow(S.idx,S.session.length,()=>set({view:"menu"})),p("order-hint",`„${card.stelle}" – Tippe zwei Abschnitte an, um sie zu tauschen`),list,bottom);
}

// ── Done ─────────────────────────────────────────────────────────
function renderDone(){
  const ok=S.results.filter(r=>r.correct).length,tot=S.results.length;
  const emoji=ok>=8?"🌟":ok>=5?"👏":"💪";
  const title=ok>=8?"Hervorragend!":ok>=5?"Gut gemacht!":"Weiter üben!";
  const dots=div("rdots",...S.results.map(r=>div("rdot "+(r.correct?"rdot-ok":"rdot-no"),r.correct?"✓":"✗")));
  const list=div("rlist",...S.results.map(r=>div("ritem",el("div",{cls:"ri-marker",style:`background:${r.correct?"#86efac":"#fca5a5"}`}),el("div",{},p("ri-stelle",r.stelle),p("ri-text",r.text.length>80?r.text.slice(0,80)+"…":r.text)))));
  return el("div",{},
    div("done-top",span("done-emoji",emoji),el("h2",{cls:"done-title"},title),p("done-sub",`${ok} von ${tot} Versen gewusst`),dots),
    list,div("btn-row",btn("ghost-btn","Menü",()=>set({view:"menu"})),btn("prim-btn","Neue Runde",()=>set({view:"flash",session:pickTen(S.verses),idx:0,flipped:false,results:[]})))
  );
}

// ── Profile ──────────────────────────────────────────────────────
function renderProfile(){
  const u=S.user;
  const mastered=S.verses.filter(v=>v.score>=5).length;
  const hdr=div("page-header",btn("back-btn","←",()=>set({view:"menu"})),el("h2",{cls:"page-title"},"Profil bearbeiten"));
  const hero=div("profile-hero",
    el("div",{cls:"profile-big-avatar",style:`background:${S.pColor}30;border-color:${S.pColor}60;box-shadow:0 0 32px ${S.pColor}44`},S.pEmoji),
    p("profile-name",u.name),p("profile-meta",`${S.verses.length} Verse · ${mastered} gemeistert`)
  );
  const eRow=div("emoji-row",...EMOJIS.map(em=>btn("emoji-opt"+(S.pEmoji===em?" sel":""),em,()=>set({pEmoji:em}))));
  const cRow=div("color-row",...PALETTE.map(c=>{const d=div("color-opt"+(S.pColor===c?" sel":""));d.style.background=c;d.onclick=()=>set({pColor:c});return d;}));
  const changed=S.pEmoji!==u.emoji||S.pColor!==u.color;
  const saveApp=btn("save-btn","Aussehen speichern",async()=>{
    const upd={...u,emoji:S.pEmoji,color:S.pColor};
    await saveUsers(S.users.map(x=>x.id===u.id?upd:x));
    S.user=upd;render();
  });
  if(!changed) saveApp.disabled=true;
  const pOldI=el("input",{cls:"f-input",type:"password",placeholder:"••••••"});pOldI.value=S.pOld;pOldI.oninput=e=>{S.pOld=e.target.value;S.pErr="";S.pOk=false;};
  const pNewI=el("input",{cls:"f-input",type:"password",placeholder:"Neues Passwort"});pNewI.value=S.pNew;pNewI.oninput=e=>{S.pNew=e.target.value;S.pErr="";S.pOk=false;};
  const pNew2I=el("input",{cls:"f-input",type:"password",placeholder:"Bestätigen",style:"margin-bottom:0"});pNew2I.value=S.pNew2;pNew2I.oninput=e=>{S.pNew2=e.target.value;S.pErr="";S.pOk=false;};
  const pErrEl=span("err-msg",S.pErr);if(!S.pErr)pErrEl.style.display="none";
  const pOkEl=span("success-msg","Passwort erfolgreich geändert.");if(!S.pOk)pOkEl.style.display="none";
  const savePw=btn("save-btn","Passwort ändern",async()=>{
    if(S.pOld!==u.pw){set({pErr:"Aktuelles Passwort ist falsch.",pOk:false});return;}
    if(S.pNew.length<2){set({pErr:"Neues Passwort zu kurz.",pOk:false});return;}
    if(S.pNew!==S.pNew2){set({pErr:"Passwörter stimmen nicht überein.",pOk:false});return;}
    const upd={...u,pw:S.pNew};
    await saveUsers(S.users.map(x=>x.id===u.id?upd:x));
    S.user=upd;set({pOld:"",pNew:"",pNew2:"",pErr:"",pOk:true});
  });
  savePw.style.marginTop="12px";
  const pwPanel=div("form-panel",el("label",{cls:"f-label"},"Aktuelles Passwort"),pOldI,el("label",{cls:"f-label"},"Neues Passwort"),pNewI,el("label",{cls:"f-label"},"Wiederholen"),pNew2I,pErrEl,pOkEl,savePw);
  let dangerBtns;
  if(!S.delU) dangerBtns=btn("danger-btn","Profil löschen",()=>set({delU:true}));
  else dangerBtns=el("div",{style:"display:flex;gap:8px"},
    btn("danger-btn danger-btn-confirm","Ja, endgültig löschen",async()=>{
      await saveUsers(S.users.filter(x=>x.id!==u.id));
      await fbDel("verses",u.id);
      S.user=null;S.verses=[];S.view="select";S.delU=false;render();
    }),
    btn("danger-btn","Abbrechen",()=>set({delU:false}))
  );
  return el("div",{},hdr,hero,
    div("profile-section",p("section-label","Symbol"),eRow,p("section-label","Farbe"),cRow,saveApp),
    div("profile-section",p("section-label","Passwort ändern"),pwPanel),
    div("danger-zone",p("danger-title","Gefahrenzone"),p("danger-sub","Profil löschen entfernt alle Verse und den Lernfortschritt unwiderruflich."),dangerBtns)
  );
}

// ── Login Modal ──────────────────────────────────────────────────
function renderLogin(){
  const t=S.loginU;
  const overlay=div("modal-overlay");
  overlay.onclick=()=>set({modal:null});
  const modal=div("modal");
  modal.onclick=e=>e.stopPropagation();
  const inp=el("input",{cls:"m-input"+(S.pwErr?" err":""),type:"password",placeholder:"••••••"});
  inp.value=S.pw;inp.oninput=e=>{S.pw=e.target.value;};
  inp.onkeydown=e=>{if(e.key==="Enter")doLogin();};
  const errEl=span("err-msg","Falsches Passwort. Nochmal versuchen.");if(!S.pwErr)errEl.style.display="none";
  modal.append(
    el("div",{style:"display:flex;align-items:center;gap:12px;margin-bottom:16px"},
      el("div",{style:`width:46px;height:46px;border-radius:50%;background:${t.color}28;border:2px solid ${t.color}55;display:flex;align-items:center;justify-content:center;font-size:24px`},t.emoji),
      el("div",{},p("modal-title",t.name),p("modal-sub","Passwort eingeben"))
    ),
    el("label",{cls:"m-label"},"Passwort"),inp,errEl,
    div("modal-btns",btn("m-ghost","Abbrechen",()=>set({modal:null})),btn("m-prim","Anmelden",doLogin))
  );
  overlay.appendChild(modal);
  setTimeout(()=>inp.focus(),50);
  return overlay;
}
async function doLogin(){
  const t=S.loginU;
  const h=await hashPw(S.pw);
  if(h===t.pw){
    S.modal=null;render();
    const vd=await fbGet("verses",t.id);
    S.verses=vd?(vd.list||[]):[];
    S.counts={...S.counts,[t.id]:S.verses.length};
    S.user=t;S.view="menu";render();
  } else set({pwErr:true});
}

// ── New User Modal ───────────────────────────────────────────────
function renderNewUser(){
  const overlay=div("modal-overlay");
  overlay.onclick=()=>set({modal:null});
  const modal=div("modal");
  modal.onclick=e=>e.stopPropagation();
  const nI=el("input",{cls:"m-input",placeholder:"Dein Name",type:"text"});nI.value=S.nName;nI.oninput=e=>S.nName=e.target.value;
  const eRow=div("emoji-row",...EMOJIS.map(em=>btn("emoji-opt"+(S.nEmoji===em?" sel":""),em,()=>set({nEmoji:em}))));
  const cRow=div("color-row",...PALETTE.map(c=>{const d=div("color-opt"+(S.nColor===c?" sel":""));d.style.background=c;d.onclick=()=>set({nColor:c});return d;}));
  const p1=el("input",{cls:"m-input",type:"password",placeholder:"Passwort wählen"});p1.value=S.nPw;p1.oninput=e=>S.nPw=e.target.value;
  const p2=el("input",{cls:"m-input",type:"password",placeholder:"Passwort bestätigen"});p2.value=S.nPw2;p2.oninput=e=>S.nPw2=e.target.value;
  p2.onkeydown=e=>{if(e.key==="Enter")doCreate();};
  const errEl=span("err-msg",S.nErr);if(!S.nErr)errEl.style.display="none";
  modal.append(
    p("modal-title","Neuer Benutzer"),p("modal-sub","Erstelle dein persönliches Profil"),
    el("label",{cls:"m-label"},"Name"),nI,
    el("label",{cls:"m-label"},"Symbol"),eRow,
    el("label",{cls:"m-label"},"Farbe"),cRow,
    el("label",{cls:"m-label"},"Passwort"),p1,
    el("label",{cls:"m-label"},"Wiederholen"),p2,errEl,
    div("modal-btns",btn("m-ghost","Abbrechen",()=>set({modal:null})),btn("m-prim","Profil erstellen",doCreate))
  );
  overlay.appendChild(modal);
  return overlay;
}
async function doCreate(){
  if(!S.nName.trim()){set({nErr:"Bitte einen Namen eingeben."});return;}
  if(S.nPw.length<4){set({nErr:"Passwort muss mindestens 4 Zeichen haben."});return;}
  if(S.nPw!==S.nPw2){set({nErr:"Passwörter stimmen nicht überein."});return;}
  const name=S.nName.trim(),pw=S.nPw,color=S.nColor,emoji=S.nEmoji;
  const id="u_"+Date.now();
  const h=await hashPw(pw);
  const u={id,name,pw:h,color,emoji};
  await saveUsers([...S.users,u]);
  await fbSet("verses",id,{list:[]});
  S.counts={...S.counts,[id]:0};
  S.verses=[];S.user=u;S.view="menu";S.modal=null;
  render();
}

// ── Boot ─────────────────────────────────────────────────────────
(async()=>{
  // Sofort rendern mit leerem Zustand – kein Ladescreen
  render();
  try{
    let data=await fbGet("app","users");
    if(!data){await fbSet("app","users",{list:[]});data={list:[]};}
    const userList=data.list||[];
    const counts={};
    for(const u of userList){
      const vd=await fbGet("verses",u.id);
      counts[u.id]=(vd?.list||[]).length;
    }
    S.users=userList;S.counts=counts;
  } catch(e){console.error("Boot:",e);}
  render();
})();
</script>
